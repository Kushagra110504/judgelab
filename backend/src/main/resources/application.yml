spring:
  application:
    name: judgelab-backend

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:judgelab}
    username: ${DB_USER:judgelab}
    password: ${DB_PASS:judgelab}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: none          # Flyway owns the schema; Hibernate must not modify it
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true  # safe for databases that pre-date Flyway tracking
    validate-on-migrate: true

server:
  port: 8080

logging:
  level:
    com.judgelab: DEBUG
    org.springframework.security: WARN
