spring:
  application:
    name: judgelab-backend

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:judgelab}?TimeZone=UTC
    username: ${DB_USER:judgelab}
    password: ${DB_PASS:judgelab}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate        # Flyway creates schema; Hibernate validates entities match it
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC        # Ensures Instant fields are stored/retrieved in UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true  # safe for databases that pre-date Flyway tracking
    validate-on-migrate: true

server:
  port: 8080

logging:
  level:
    com.judgelab: DEBUG
    org.springframework.security: WARN
