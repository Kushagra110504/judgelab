services:
  postgres:
    image: postgres:17
    container_name: judgelab-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: judgelab
      POSTGRES_USER: judgelab
      POSTGRES_PASSWORD: judgelab
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U judgelab -d judgelab"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    name: judgelab_postgres_data
